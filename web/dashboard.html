<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake RL 训练监控后台</title>
    <link rel="stylesheet" href="/dashboard.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Snake RL 训练监控后台</h1>
        <p class="sub">轻量、直观、无需 TensorBoard</p>
      </div>
      <div class="actions">
        <label>
          自动刷新
          <select id="refreshInterval">
            <option value="0">关闭</option>
            <option value="2000">2s</option>
            <option value="5000" selected>5s</option>
            <option value="10000">10s</option>
          </select>
        </label>
        <button type="button" id="refreshBtn">立即刷新</button>
      </div>
    </header>

    <div id="statusBar" class="status-bar" role="status">
      <span id="statusText" class="status-text">就绪</span>
      <span id="statusTime" class="status-time"></span>
      <button type="button" id="retryBtn" class="retry-btn hidden">重试</button>
    </div>
    <div id="errorBanner" class="error-banner hidden" role="alert"></div>

    <main class="layout">
      <section class="panel runs-panel">
        <div class="panel-title-row">
          <h2>运行列表</h2>
          <span id="runsCount" class="hint">0 条</span>
        </div>
        <div class="search-row">
          <input id="keywordInput" placeholder="按 run 名或模型筛选..." />
          <select id="statusFilter">
            <option value="">全部状态</option>
            <option value="完成">完成</option>
            <option value="训练中">训练中</option>
            <option value="中断">中断</option>
            <option value="空">空</option>
          </select>
        </div>
        <div id="runsList" class="runs-list"></div>
      </section>

      <section class="panel detail-panel">
        <div class="panel-title-row">
          <h2 id="detailTitle">运行详情</h2>
          <span id="detailHint" class="hint">请选择左侧运行</span>
        </div>

        <div id="detailLoading" class="detail-loading hidden">加载中…</div>

        <div id="detailBody" class="detail-body">
          <div class="badges" id="checkpointBadges"></div>

          <div class="cards">
            <article class="card">
              <h3>局数（日志）</h3>
              <p id="episodesValue">-</p>
            </article>
            <article class="card">
              <h3>最佳平均奖励</h3>
              <p id="bestAvgValue">-</p>
            </article>
            <article class="card">
              <h3>最近平均奖励</h3>
              <p id="lastAvgValue">-</p>
            </article>
            <article class="card">
              <h3>最近探索率 ε</h3>
              <p id="lastEpsValue">-</p>
            </article>
          </div>

          <div class="summary-block hidden" id="summaryBlock">
            <h3 class="block-title">训练摘要（summary.json）</h3>
            <pre id="summaryPreview" class="json-preview"></pre>
          </div>

          <div class="chart-tools">
            <label>
              曲线指标
              <select id="chartMetric">
                <option value="avg_reward" selected>avg_reward</option>
                <option value="reward">reward</option>
              </select>
            </label>
            <label>
              显示点数
              <select id="pointsLimit">
                <option value="100">100</option>
                <option value="300" selected>300</option>
                <option value="600">600</option>
                <option value="1200">1200</option>
              </select>
            </label>
          </div>
          <div class="chart-wrap">
            <canvas id="rewardChart"></canvas>
          </div>

          <details class="config-details">
            <summary>完整配置 JSON</summary>
            <pre id="configPreview" class="config-preview"></pre>
          </details>
        </div>
      </section>
    </main>

    <script src="/dashboard.js"></script>
  </body>
</html>
