<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贪吃蛇 · 演示与 AI</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="layout">
        <main class="game-column">
          <div class="game-frame">
            <canvas id="gameCanvas" width="704" height="704" aria-label="贪吃蛇游戏画布"></canvas>
            <div id="overlay" class="overlay">
              <h2 id="overlayTitle">准备开始</h2>
              <p id="overlayText">按「开始」或 Enter 开一局</p>
            </div>
          </div>
          <section class="touch-controls" aria-label="屏幕转向键">
            <button type="button" data-turn="left">左转 A</button>
            <button type="button" data-turn="right">右转 D</button>
          </section>
          <p class="tips-inline">
            键盘：<kbd>A</kbd><kbd>D</kbd> / 方向键转向 · <kbd>空格</kbd><kbd>P</kbd>暂停 · <kbd>R</kbd>重开 · <kbd>Enter</kbd>开始
          </p>
        </main>

        <aside class="side-column">
          <header class="side-header">
            <h1>贪吃蛇</h1>
            <p class="subtitle">人机对战 · 本地模型推理</p>
          </header>

          <section class="card">
            <h2 class="card-title">本局设置</h2>
            <div class="field">
              <label for="difficulty">难度</label>
              <select id="difficulty">
                <option value="easy">休闲</option>
                <option value="normal" selected>标准</option>
                <option value="hard">困难</option>
                <option value="expert">大师</option>
              </select>
            </div>
            <div class="field">
              <label for="mode">边界</label>
              <select id="mode">
                <option value="classic" selected>撞墙结束</option>
                <option value="wrap">穿墙环绕</option>
              </select>
            </div>
            <div class="field">
              <label for="boardSize">地图</label>
              <select id="boardSize">
                <option value="8">8×8</option>
                <option value="10">10×10</option>
                <option value="12">12×12</option>
                <option value="14">14×14</option>
                <option value="16">16×16</option>
                <option value="18">18×18</option>
                <option value="20">20×20</option>
                <option value="22" selected>22×22</option>
                <option value="28">28×28</option>
              </select>
            </div>
            <div class="btn-row">
              <button type="button" id="startBtn" class="btn btn-primary">开始 / 重开</button>
              <button type="button" id="pauseBtn" class="btn btn-ghost" disabled>暂停</button>
            </div>
          </section>

          <section class="card card-ai">
            <h2 class="card-title">AI 演示</h2>
            <div class="btn-row ai-primary-row">
              <button type="button" id="loadModelBtn" class="btn btn-secondary">加载模型</button>
              <button type="button" id="startAiBtn" class="btn btn-primary" disabled>AI 接管</button>
              <button type="button" id="stopAiBtn" class="btn btn-danger" disabled>停止</button>
            </div>
            <div class="field field-compact">
              <label for="checkpointPath">模型路径</label>
              <input
                id="checkpointPath"
                type="text"
                placeholder="runs/…/checkpoints/best.pt"
                spellcheck="false"
                autocomplete="off"
              />
            </div>
            <p id="checkpointHint" class="checkpoint-hint" style="display:none"></p>
            <div class="field field-inline">
              <label for="aiStepDelay">步延迟</label>
              <input id="aiStepDelay" type="number" min="0" step="10" value="60" />
              <span class="suffix">ms</span>
              <label class="check-inline">
                <input id="aiAutoLoop" type="checkbox" />
                循环演示
              </label>
            </div>
            <label class="check-inline check-perception">
              <input id="showPerception" type="checkbox" />
              显示感知 / Q 值（tiny 模型可看到射线）
            </label>
            <details class="advanced-details">
              <summary>高级 · 推理服务地址</summary>
              <div class="field">
                <label for="inferenceServerUrl">服务 URL</label>
                <input
                  id="inferenceServerUrl"
                  type="text"
                  value="http://127.0.0.1:8765"
                  spellcheck="false"
                  autocomplete="off"
                />
              </div>
            </details>
            <p id="aiStatus" class="ai-status">未连接推理服务。</p>
          </section>

          <section class="hud" aria-label="游戏数据">
            <div class="hud-item"><span class="hud-label">分数</span><strong id="scoreValue">0</strong></div>
            <div class="hud-item"><span class="hud-label">最高分</span><strong id="bestScoreValue">0</strong></div>
            <div class="hud-item"><span class="hud-label">长度</span><strong id="lengthValue">3</strong></div>
            <div class="hud-item"><span class="hud-label">等级</span><strong id="levelValue">1</strong></div>
            <div class="hud-item"><span class="hud-label">速度</span><strong id="speedValue">1x</strong></div>
          </section>
        </aside>
      </div>
    </div>

    <script src="./game.js"></script>
  </body>
</html>
